<!doctype html>
<html>
  <body style="margin:0;background:#f5f7fb;font-family:Arial,Helvetica,sans-serif;color:#111827;">
    <div style="max-width:640px;margin:0 auto;padding:28px 18px;">
      <div style="background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;padding:28px;">
        <h1 style="margin:0 0 14px;font-size:24px;line-height:1.2;color:#111827;">{% block title %}AI Career Copilot{% endblock %}</h1>
        <div style="font-size:15px;line-height:1.65;color:#374151;">{% block content %}{% endblock %}</div>
      </div>
      <p style="font-size:12px;color:#6b7280;text-align:center;margin-top:16px;">AI Career Copilot ? Career automation for students and professionals</p>
    </div>
  </body>
</html>
